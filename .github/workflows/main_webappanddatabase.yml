# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - WebAppAndDataBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      # --- НОВІ КРОКИ ДЛЯ EF CORE З АВТОПОШУКОМ ПРОЄКТУ ---
      
      - name: Install EF Core Tool
        run: dotnet tool install -g dotnet-ef --version 7.0.14

      - name: Create migration bundle
        run: |
          # Знаходимо шлях до файлу проекту автоматично
          PROJECT_PATH=$(find . -name "*.csproj" -print -quit)
          echo "Found project at: $PROJECT_PATH"
          dotnet ef migrations bundle --runtime linux-x64 -p "$PROJECT_PATH" -o ${{env.DOTNET_ROOT}}/myapp/migrate
          
      # --------------------------------------------------

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E3558020DD4E4B8D86D01B916D58C3E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9C8D5E1C904D4CEE827FF14C612D75FF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6D0468AC944441EEB46F077AFA62AF25 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'WebAppAndDataBase'
          slot-name: 'Production'
          package: .